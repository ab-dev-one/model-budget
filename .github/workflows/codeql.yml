name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@5433d31f4169f8dc79b7f6235bdb1049cc9cdecf
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@5433d31f4169f8dc79b7f6235bdb1049cc9cdecf

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@5433d31f4169f8dc79b7f6235bdb1049cc9cdecf
